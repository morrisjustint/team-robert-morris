<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Team Robert Morris Logo</title>
  <desc id="desc">Luxury black and gold real estate team logo</desc>
  
  <!-- Background (optional - remove if you want transparent) -->
  <rect width="1200" height="400" fill="#0f0f0f"/>

  <!-- RM Monogram -->
  <g transform="translate(80,80)">
    <!-- R -->
    <text x="0" y="220" font-family="serif" font-size="280" font-weight="700" fill="#d4af37" letter-spacing="-20">R</text>
    <!-- M -->
    <text x="220" y="220" font-family="serif" font-size="280" font-weight="700" fill="#d4af37" letter-spacing="-25">M</text>
    
    <!-- Rolling Hills / Waves at bottom -->
    <path d="M30 280 Q80 240 130 280 Q180 240 230 280 Q280 240 330 280" fill="none" stroke="#d4af37" stroke-width="28" stroke-linecap="round"/>
    <path d="M80 295 Q130 255 180 295 Q230 255 280 295" fill="none" stroke="#d4af37" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Text: TEAM ROBERT MORRIS -->
  <text x="520" y="165" font-family="Arial Black, sans-serif" font-size="92" font-weight="900" fill="#f5f5f5" letter-spacing="2">TEAM</text>
  <text x="520" y="265" font-family="Arial Black, sans-serif" font-size="115" font-weight="900" fill="#d4af37" letter-spacing="-2">ROBERT MORRIS</text>

</svg>